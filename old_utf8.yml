name: datawork_node_create_update

on:
  workflow_dispatch:
    inputs:
      action:
        description: "鎵ц鍔ㄤ綔"
        required: true
        default: "create_update"
        type: choice
        options:
          - check_only
          - create_update
          - publish_only
      env_name:
        description: "鐩爣鐜"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - pre-prod
          - prod
      project_name:
        description: "鍔熻兘鍚嶇О(濡?test-feature)銆傜暀绌哄垯鑷姩鏍规嵁鏈€杩戝彉鏇磋瘑鍒?
        required: false
        default: ""

  push:
    branches:
      - main
    paths:
      - "feature/**"
      - "features/**"
      - "default-setting/**"
      - "scripts/**"
      - ".github/workflows/datawork_node_create_update.yml"

env:
  DATAWORKS_PROJECT_ID: ${{ secrets.DATAWORKS_PROJECT_ID }}
  ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
  ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
  ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
  MAXCOMPUTE_PROJECT: ${{ secrets.MAXCOMPUTE_PROJECT }}
  MAXCOMPUTE_ENDPOINT: ${{ secrets.MAXCOMPUTE_ENDPOINT }}

jobs:
  run:
    name: DataWorks Create/Update Pipeline
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env_name || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Resolve target feature and runtime directory
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          INPUT_ENV="${{ github.event.inputs.env_name }}"
          INPUT_ACTION="${{ github.event.inputs.action }}"
          INPUT_PROJECT="${{ github.event.inputs.project_name }}"

          if [ -z "${INPUT_ENV:-}" ]; then
            INPUT_ENV="dev"
          fi

          if [ -z "${INPUT_ACTION:-}" ]; then
            INPUT_ACTION="create_update"
          fi

          FEATURE_NAME=""
          SOURCE_ROOT=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${INPUT_PROJECT}" ]; then
            FEATURE_NAME="${INPUT_PROJECT}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            fi

            CHANGED="$(git diff --name-only "$BEFORE" "$AFTER" || true)"

            FEATURE_NAME="$(echo "$CHANGED" | sed -n 's#^feature/\([^/]*\)/.*#\1#p' | head -n 1)"
            if [ -z "$FEATURE_NAME" ]; then
              FEATURE_NAME="$(echo "$CHANGED" | sed -n 's#^features/\([^/]*\)/.*#\1#p' | head -n 1)"
            fi
          fi

          if [ -z "$FEATURE_NAME" ]; then
            echo "No changed feature detected and no project_name provided."
            exit 1
          fi

          if [ -d "feature/${FEATURE_NAME}" ]; then
            SOURCE_ROOT="feature"
          elif [ -d "features/${FEATURE_NAME}" ]; then
            SOURCE_ROOT="features"
          else
            echo "Feature '${FEATURE_NAME}' not found in feature/ or features/."
            exit 1
          fi

          RUNTIME_DIR=".ci_runtime/feature/${FEATURE_NAME}/${INPUT_ENV}"
          mkdir -p "$RUNTIME_DIR"

          if [ "$SOURCE_ROOT" = "feature" ]; then
            SRC_DIR="feature/${FEATURE_NAME}/${INPUT_ENV}"
            if [ ! -f "${SRC_DIR}/setting.json" ]; then
              echo "Missing setting.json in ${SRC_DIR}"
              exit 1
            fi
            cp "${SRC_DIR}/setting.json" "${RUNTIME_DIR}/setting.json"

            if [ -f "${SRC_DIR}/create-table.sql" ]; then
              cp "${SRC_DIR}/create-table.sql" "${RUNTIME_DIR}/create-table.sql"
            fi
          else
            SRC_DIR="features/${FEATURE_NAME}"

            ENV_FILE_CANDIDATE_1="${SRC_DIR}/setting-${INPUT_ENV}.json"
            ENV_FILE_CANDIDATE_2="${SRC_DIR}/setting-$(echo "$INPUT_ENV" | sed 's/pre-prod/preprod/g').json"

            if [ -f "$ENV_FILE_CANDIDATE_1" ]; then
              cp "$ENV_FILE_CANDIDATE_1" "${RUNTIME_DIR}/setting.json"
            elif [ -f "$ENV_FILE_CANDIDATE_2" ]; then
              cp "$ENV_FILE_CANDIDATE_2" "${RUNTIME_DIR}/setting.json"
            else
              echo "Missing setting file for env=${INPUT_ENV} under ${SRC_DIR}"
              exit 1
            fi

            if [ -f "${SRC_DIR}/create-table.sql" ]; then
              cp "${SRC_DIR}/create-table.sql" "${RUNTIME_DIR}/create-table.sql"
            else
              DDL_FILE="$(ls -1 "${SRC_DIR}"/ddl/*.sql 2>/dev/null | sort | grep -Ei 'create|init' | tail -n 1 || true)"
              if [ -z "$DDL_FILE" ]; then
                DDL_FILE="$(ls -1 "${SRC_DIR}"/ddl/*.sql 2>/dev/null | sort | tail -n 1 || true)"
              fi
              if [ -n "$DDL_FILE" ]; then
                cp "$DDL_FILE" "${RUNTIME_DIR}/create-table.sql"
              fi
            fi
          fi

          if [ ! -f "${RUNTIME_DIR}/create-table.sql" ]; then
            echo "Missing create-table.sql after normalization."
            exit 1
          fi

          echo "feature_name=${FEATURE_NAME}" >> "$GITHUB_OUTPUT"
          echo "env_name=${INPUT_ENV}" >> "$GITHUB_OUTPUT"
          echo "action_name=${INPUT_ACTION}" >> "$GITHUB_OUTPUT"
          echo "project_dir=${RUNTIME_DIR}" >> "$GITHUB_OUTPUT"

      - name: Check DataSources and Node
        if: ${{ steps.resolve.outputs.action_name == 'check_only' }}
        run: |
          python scripts/check_oss_ds.py --project-dir "${{ steps.resolve.outputs.project_dir }}"
          python scripts/check_mc_ds.py --project-dir "${{ steps.resolve.outputs.project_dir }}"
          python scripts/check_integration_node.py --project-dir "${{ steps.resolve.outputs.project_dir }}"

      - name: Ensure OSS DataSource
        if: ${{ steps.resolve.outputs.action_name == 'create_update' }}
        shell: bash
        run: |
          python scripts/check_oss_ds.py --project-dir "${{ steps.resolve.outputs.project_dir }}" || \
          python scripts/create_oss_ds.py --project-dir "${{ steps.resolve.outputs.project_dir }}"

      - name: Ensure MaxCompute DataSource
        if: ${{ steps.resolve.outputs.action_name == 'create_update' }}
        shell: bash
        run: |
          python scripts/check_mc_ds.py --project-dir "${{ steps.resolve.outputs.project_dir }}" || \
          python scripts/create_mc_ds.py --project-dir "${{ steps.resolve.outputs.project_dir }}"

      - name: Create or Ensure MaxCompute Table
        if: ${{ steps.resolve.outputs.action_name == 'create_update' }}
        run: |
          python scripts/create_table.py --project-dir "${{ steps.resolve.outputs.project_dir }}"

      - name: Create or Update DataWorks Node
        if: ${{ steps.resolve.outputs.action_name == 'create_update' }}
        run: |
          python scripts/deploy.py --project-dir "${{ steps.resolve.outputs.project_dir }}"

      - name: Publish DataWorks Node
        if: ${{ steps.resolve.outputs.action_name == 'publish_only' || (steps.resolve.outputs.action_name == 'create_update' && github.ref == 'refs/heads/main') }}
        run: |
          python scripts/publish_node.py --project-dir "${{ steps.resolve.outputs.project_dir }}"
