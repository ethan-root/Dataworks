name: Test Vault AK/SK Retrieval and Encrypt

on:
  workflow_dispatch: 

permissions:
  id-token: write 
  contents: read  

jobs:
  test-vault-connection:
    runs-on: kt-gu-cn
    
    steps:
      - name: 1. 执行 Vault 身份认证并获取机密
        uses: hashicorp/vault-action@v2
        with:
          url: "https://vault.arsenal.mgmt4apps.io"
          role: "tactiq-cus-ghes-cn"
          path: "github-cn"
          method: jwt
          secrets: |
            cus/data/ghes-cn/alicloud/secrets/nonprod FLINK_ACCESS_KEY | TEST_AK;
            cus/data/ghes-cn/alicloud/secrets/nonprod FLINK_ACCESS_SECRET | TEST_SK;

      - name: 2. 验证并加密输出 AK
        run: |
          echo "==== 开始执行逻辑校验与数据加密 ===="
          
          if [ -n "$TEST_AK" ] && [ -n "$TEST_SK" ]; then
            echo "状态：成功。已从 Vault 接收到基础数据。"
            
            # 设定加密密码（此处的密码仅作测试展示。生产环境中，这个密码也应该从 Vault 获取或存放在 GitHub Secrets 中）
            ENCRYPTION_PASSWORD="my_test_password_123"
            
            # 使用 openssl 工具执行加密计算：
            # -aes-256-cbc：指定工业标准的加密算法
            # -pbkdf2：启用更安全的密钥派生函数
            # -a：将加密后的二进制结果转换为可打印的文本格式 (Base64)
            # -salt：加入随机盐值，确保每次加密相同内容产生不同的密文
            
            ENCRYPTED_AK=$(echo -n "$TEST_AK" | openssl enc -aes-256-cbc -pbkdf2 -a -salt -pass pass:$ENCRYPTION_PASSWORD)
            
            echo "==== 加密结果 ===="
            # 这一行在日志中会输出真正的密文字符串，而不会是 ***
            echo "加密后的 AK 密文: $ENCRYPTED_AK"
            
          else
            echo "状态：失败。未获取到有效数据，环境变量为空。"
            exit 1
          fi
          
          echo "==== 处理结束 ===="