name: Test Vault Secrets

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        required: true
        default: "self-hosted"
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

jobs:
  test_vault_secrets:
    timeout-minutes: 5
    runs-on: ${{ github.event.inputs.runner == 'self-hosted' && fromJSON('["self-hosted","linux"]') || 'ubuntu-latest' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show selected runner
        shell: bash
        run: |
          echo "Selected runner input: ${GITHUB_EVENT_INPUTS_RUNNER:-self-hosted}"

      - name: Check Vault connectivity
        shell: bash
        run: |
          set -euo pipefail
          echo "DNS lookup"
          getent hosts vault.arsenal.mgmt4apps.io || true
          echo "Vault health endpoint"
          curl -sS -o /tmp/vault_health.txt -w "HTTP %{http_code}\n" --connect-timeout 8 --max-time 20 https://vault.arsenal.mgmt4apps.io/v1/sys/health || true
          echo "Health response preview"
          head -c 300 /tmp/vault_health.txt || true

      - name: Get secrets from vault
        id: secrets
        uses: hashicorp/vault-action@v2
        with:
          url: "https://vault.arsenal.mgmt4apps.io"
          role: "tactiq-cus-ghes-cn"
          path: "github-cn"
          method: jwt
          secrets: |
            cus/data/ghes-cn/alicloud/secrets/nonprod DATAWORKS_ACCESS_KEY;
            cus/data/ghes-cn/alicloud/secrets/nonprod DATAWORKS_ACCESS_SECRET;

      - name: Test DATAWORKS AK/SK
        shell: bash
        run: |
          # Mask secret to avoid accidental leakage in logs
          echo "::add-mask::${DATAWORKS_ACCESS_SECRET}"

          # Print one value for verification
          echo "DATAWORKS_ACCESS_KEY=${DATAWORKS_ACCESS_KEY}"

          # Do not print the raw secret value
          echo "DATAWORKS_ACCESS_SECRET=***masked***"
