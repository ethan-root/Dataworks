# ─────────────────────────────────────────────────────────────────────────────
# _deploy_env.yml  ·  DataWorks 单环境部署可复用工作流
#
# 职责：接受 env_name 和 feature_list 两个输入参数，调用 ci_runner.py
#       执行该环境下所有 feature 的「检查 → 创建/更新 → 发布」流程。
#
# 调用方：datawork_node_create_update.yml
# 业务逻辑：scripts/ci_runner.py
# ─────────────────────────────────────────────────────────────────────────────
name: "[Internal] Deploy to Environment"

on:
  workflow_call:
    inputs:
      env_name:
        description: "目标环境名称 (dev / qa / preprod / prod)"
        required: true
        type: string
      feature_list:
        description: "逗号分隔的 feature 列表，例如: test-feature,user-feature"
        required: true
        type: string
    secrets:
      ALIYUN_ACCESS_KEY_ID:
        required: true
      ALIYUN_ACCESS_KEY_SECRET:
        required: true

jobs:
  deploy:
    name: "Deploy → ${{ inputs.env_name }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # ── DataWorks / 阿里云凭证（由主流水线传入）──────────────────
      ALIBABA_CLOUD_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

    steps:
      # ── 准备：检出代码、安装 Python 依赖 ──────────────────────────
      - name: "⬇️  Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: pip install -r scripts/requirements.txt

      - name: "📋 Load env config from JSON files"
        shell: bash
        run: |
          REGION=$(jq -r '.region' configuration/integration-config.json)
          DW_PROJECT_ID=$(jq -r '.metadata.project.projectId' configuration/integration-config.json)
          MC_PROJECT=$(jq -r '.project' configuration/maxcompute-datasource.json)
          MC_ENDPOINT=$(jq -r '.endpoint' configuration/maxcompute-datasource.json)
          echo "ALIYUN_REGION=${REGION}"             >> $GITHUB_ENV
          echo "DATAWORKS_PROJECT_ID=${DW_PROJECT_ID}" >> $GITHUB_ENV
          echo "MAXCOMPUTE_PROJECT=${MC_PROJECT}"    >> $GITHUB_ENV
          echo "MAXCOMPUTE_ENDPOINT=${MC_ENDPOINT}"  >> $GITHUB_ENV

      # ── 核心：调用 Python 编排脚本执行部署 ──────────────────────────
      # 所有业务逻辑（check / create / update / publish）均在
      # scripts/ci_runner.py 中实现，YAML 层无任何业务逻辑。
      # 本地调试方式：python scripts/ci_runner.py --feature-list <name> --env dev
      - name: "🚀 Run ci_runner.py for [${{ inputs.env_name }}]"
        run: |
          python scripts/ci_runner.py \
            --feature-list "${{ inputs.feature_list }}" \
            --env "${{ inputs.env_name }}"
