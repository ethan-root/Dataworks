# ─────────────────────────────────────────────────────────────────────────────
# _deploy_env.yml  ·  DataWorks 单环境部署可复用工作流
#
# 职责：接受 env_name 和 feature_list 两个输入参数，对每一个变更的 feature
#       按序执行「检查 → 创建/更新 → 发布」完整部署流程。
#
# 调用方：datawork_node_create_update.yml
# ─────────────────────────────────────────────────────────────────────────────
name: "[Internal] Deploy to Environment"

on:
  workflow_call:
    inputs:
      env_name:
        description: "目标环境名称 (dev / qa / preprod / prod)"
        required: true
        type: string
      feature_list:
        description: "逗号分隔的 feature 列表，例如: test-feature,user-feature"
        required: true
        type: string
    secrets:
      DATAWORKS_PROJECT_ID:
        required: true
      ALIYUN_ACCESS_KEY_ID:
        required: true
      ALIYUN_ACCESS_KEY_SECRET:
        required: true
      ALIYUN_REGION:
        required: true
      MAXCOMPUTE_PROJECT:
        required: true
      MAXCOMPUTE_ENDPOINT:
        required: true

jobs:
  deploy:
    name: "Deploy → ${{ inputs.env_name }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}

    env:
      DATAWORKS_PROJECT_ID:         ${{ secrets.DATAWORKS_PROJECT_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_ID:  ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ALIYUN_REGION:                ${{ secrets.ALIYUN_REGION }}
      MAXCOMPUTE_PROJECT:           ${{ secrets.MAXCOMPUTE_PROJECT }}
      MAXCOMPUTE_ENDPOINT:          ${{ secrets.MAXCOMPUTE_ENDPOINT }}

    steps:
      # ── 准备：检出代码、安装 Python 依赖 ──────────────────────────────────
      - name: "⬇️  Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: pip install -r scripts/requirements.txt

      # ── 核心：逐个 feature 执行部署逻辑 ──────────────────────────────────
      - name: "🚀 Deploy all changed features to [${{ inputs.env_name }}]"
        shell: bash
        run: |
          set -euo pipefail

          FEATURE_LIST="${{ inputs.feature_list }}"
          ENV_NAME="${{ inputs.env_name }}"

          # ─────────────────────────────────────────────────────────────────
          # 工具函数：打印阶段日志头
          # ─────────────────────────────────────────────────────────────────
          log_step() {
            local step="$1"
            local total="$2"
            local desc="$3"
            echo "  ├─ [${step}/${total}] ${desc}"
          }

          log_done() {
            echo "  └─ ✅ done"
          }

          # ─────────────────────────────────────────────────────────────────
          # 遍历每一个 feature，串行执行
          # ─────────────────────────────────────────────────────────────────
          echo "$FEATURE_LIST" | tr ',' '\n' | while read -r FEATURE_NAME; do
            [ -z "$FEATURE_NAME" ] && continue

            echo ""
            echo "╔══════════════════════════════════════════════════════════════╗"
            echo "║  🚀 DataWorks Deploy   feature: ${FEATURE_NAME}   env: ${ENV_NAME}"
            echo "╚══════════════════════════════════════════════════════════════╝"

            PROJECT_DIR="features/${FEATURE_NAME}"
            SETTING_FILE="${PROJECT_DIR}/setting-${ENV_NAME}.json"

            # ── 前置校验 ─────────────────────────────────────────────────
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "  ⚠️  目录不存在: ${PROJECT_DIR}，跳过此 feature。"
              continue
            fi
            if [ ! -f "$SETTING_FILE" ]; then
              echo "  ⚠️  缺少环境配置文件: ${SETTING_FILE}，跳过此 feature。"
              continue
            fi

            # ── 步骤 0：检查集成节点是否已存在 ──────────────────────────
            echo ""
            echo "  ┌─ 判断节点是否已存在..."
            # 3. 检查数据节点是否被创建（退出码 0 表示已存在）
            if python scripts/check_integration_node.py \
                  --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then

              # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              # UPDATE 分支：节点已存在，只做更新
              # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              echo ""
              echo "  ┌─ [UPDATE WORKFLOW] 节点已存在，执行更新流程"
              log_step 1 1 "🔄 更新数据集成节点配置"
              # 3.2.1 获取已有节点配置（已封装在 update 脚本内）
              # 3.2.2 更新数据集成节点
              python scripts/update_integration_node.py \
                    --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              log_done

            else

              # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              # CREATE 分支：节点不存在，全量创建
              # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              echo ""
              echo "  ┌─ [CREATION WORKFLOW] 节点不存在，执行完整创建流程"

              # 3.1.1 检查 OSS 是否被创建，未创建则创建
              log_step 1 7 "☁️  确保 OSS 数据源存在"
              if ! python scripts/check_oss_ds.py \
                      --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_oss_ds.py \
                      --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              log_done

              # 3.1.2 检查 Maxcompute 数据源是否被创建，未创建则创建
              log_step 2 7 "🗄️  确保 MaxCompute 数据源存在"
              if ! python scripts/check_mc_ds.py \
                      --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_mc_ds.py \
                      --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              log_done

              # 3.1.3 创建 Maxcompute SQL 表
              log_step 3 7 "📄 创建 MaxCompute 目标表（幂等）"
              python scripts/create_table.py \
                    --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              log_done

              # 3.1.6.a (前置) 创建 Python 节点 - Copy Parquet File
              log_step 4 7 "🐍 创建上游 Python 节点 (Copy Parquet File)"
              python scripts/create_python_cp_node.py \
                    --project-dir "$PROJECT_DIR" --env "$ENV_NAME" \
                    --node-type cp
              log_done

              # 3.1.4 创建数据集成节点
              log_step 5 7 "🔗 创建数据集成节点"
              python scripts/create_integration_node.py \
                    --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              log_done

              # 3.1.5 创建下游节点
              log_step 6 7 "📤 创建下游节点 (Parquet → completed)"
              python scripts/create_downstream_node.py \
                    --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              log_done

              # 3.1.6.b (后置) 创建 Python 节点 - MaxCompute Data Delete
              log_step 7 7 "🐍 创建下游 Python 节点 (MaxCompute Data Delete)"
              python scripts/create_python_cp_node.py \
                    --project-dir "$PROJECT_DIR" --env "$ENV_NAME" \
                    --node-type delete
              log_done

            fi

            # ── 最终：发布节点 ───────────────────────────────────────────
            echo ""
            echo "  ┌─ 🚀 发布节点到 ${ENV_NAME} 环境..."
            # 3.1.7 / 3.2.3 发布节点（创建和更新分支均需执行）
            python scripts/publish_node.py \
                  --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            log_done

            echo ""
            echo "  ✅ feature [${FEATURE_NAME}] 在 [${ENV_NAME}] 环境部署完成。"
            echo "────────────────────────────────────────────────────────────────"
          done
