name: Test Vault Composite Script

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        required: true
        default: "self-hosted"
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

jobs:
  test_vault_composite_script:
    timeout-minutes: 8
    runs-on: ${{ github.event.inputs.runner == 'self-hosted' && fromJSON('["self-hosted","linux"]') || 'ubuntu-latest' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Retrieve vault token
        id: vault_token
        run: |
          OIDC_TOKEN=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}" -H "User-Agent: actions/oidc-client" -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN")
          VAULT_TOKEN=$(echo $OIDC_TOKEN | jq -j '.value')
          echo "OIDC token fetched successfully"
        shell: sh

      - name: Get secrets from vault
        id: secrets
        uses: hashicorp/vault-action@v2
        with:
          url: "https://vault.arsenal.mgmt4apps.io"
          role: "tactiq-cus-ghes-cn"
          path: "github-cn"
          method: jwt
          secrets: |
            cus/data/ghes-cn/alicloud/secrets/nonprod FLINK_ACCESS_KEY;
            cus/data/ghes-cn/alicloud/secrets/nonprod FLINK_ACCESS_SECRET;
            cus/data/ghes-cn/alicloud/secrets/nonprod DATAWORKS_ACCESS_KEY;
            cus/data/ghes-cn/alicloud/secrets/nonprod DATAWORKS_ACCESS_SECRET;
            cus/data/ghes-cn/secrets ARTIFACTORY_USERNAME;
            cus/data/ghes-cn/secrets ARTIFACTORY_PASSWORD;
            cus/data/ghes-cn/alicloud/secrets/prod FLINK_ACCESS_KEY | PROD_FLINK_ACCESS_KEY;
            cus/data/ghes-cn/alicloud/secrets/prod FLINK_ACCESS_SECRET | PROD_FLINK_ACCESS_SECRET;

      - name: Validate fetched secrets
        shell: bash
        run: |
          set -euo pipefail

          required=(
            FLINK_ACCESS_KEY
            FLINK_ACCESS_SECRET
            DATAWORKS_ACCESS_KEY
            DATAWORKS_ACCESS_SECRET
            ARTIFACTORY_USERNAME
            ARTIFACTORY_PASSWORD
            PROD_FLINK_ACCESS_KEY
            PROD_FLINK_ACCESS_SECRET
          )

          for key in "${required[@]}"; do
            val="${!key:-}"
            if [ -z "$val" ]; then
              echo "Missing secret: $key"
              exit 1
            fi
            echo "::add-mask::$val"
          done

          echo "All required secrets were fetched successfully."
          echo "DATAWORKS_ACCESS_KEY is available."
          echo "DATAWORKS_ACCESS_SECRET is masked in logs."
