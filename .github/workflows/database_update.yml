# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# database_update.yml  路  MaxCompute DDL 鎵ц娴佹按绾?
#
# 瑙﹀彂鏉′欢锛?
#   1. pull_request 鈫?main锛歅R 鏃舵墽琛?plan锛堟墦鍗板彉鏇存枃浠跺垪琛紝渚?review 鍙傝€冿級
#   2. workflow_dispatch(mode=plan)锛氭墜鍔?plan锛堟煡鐪嬩細鍙樻洿鍝簺 DDL锛?
#   3. workflow_dispatch(mode=apply)锛氭墜鍔ㄥ鍗曚釜鐜鎵ц DDL
#   4. workflow_dispatch(mode=apply_all)锛氫竴閿覆琛屾墽琛屾墍鏈夌幆澧冿紙璁捐鍥炬爣鍑嗘祦绋嬶級
#                                        椤哄簭锛歞ev 鈫?qa 鈫?pre-prod 鈫?prod
#                                        prod 鐜闇€浜哄伐鍦?GitHub Environment 瀹℃壒
#
# DDL 骞傜瓑淇濋殰锛歝reate_table.py 涓娇鐢?IF NOT EXISTS锛岄噸澶嶆墽琛屼笉鎶ラ敊
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
name: database_update

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "杩愯妯″紡"
        required: true
        default: "plan"
        type: choice
        options:
          - plan          # 浠呮樉绀哄皢瑕佸彉鏇寸殑 DDL 鏂囦欢锛屼笉鎵ц
          - apply         # 瀵规寚瀹?env_name 鍗曠嫭鎵ц DDL
          - apply_all     # 涓茶鎵ц鎵€鏈夌幆澧? dev 鈫?qa 鈫?pre-prod 鈫?prod
      env_name:
        description: "鐩爣鐜锛堜粎 apply 妯″紡鏈夋晥锛?
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - pre-prod
          - prod
      project_name:
        description: "鍔熻兘鍚嶇О (濡?test-feature)"
        required: true
        default: "test-feature"

  pull_request:
    branches:
      - main
    paths:
      - "feature/**/create-table.sql"
      - "features/**/ddl/**"
      - ".github/workflows/database_update.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 鈹€鈹€ 鍙湁 AK/SK 淇濈暀鍦?Secrets锛屽叾浣欎粠 JSON 閰嶇疆鏂囦欢璇诲彇 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  ALIBABA_CLOUD_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
  ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# 鍙鐢ㄥ伐鍏凤細鏍囧噯鍖?DDL 鐩綍锛堝吋瀹规棫鐩綍缁撴瀯锛?
# 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
# 娉細浠ヤ笅 normalize 姝ラ琚涓?job 寮曠敤锛岄€氳繃 outputs 浼犻€?project_dir

jobs:
  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  # Job: plan  路  鎵撳嵃 DDL 鍙樻洿娓呭崟锛圥R 瑙﹀彂 鎴?鎵嬪姩 plan 瑙﹀彂锛?
  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  plan:
    name: "馃搵 Plan - Show DDL Changes"
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'plan')
    runs-on: ubuntu-latest
    steps:
      - name: "猬囷笍  Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "馃搵 Print changed DDL files"
        shell: bash
        run: |
          set -euo pipefail
          echo "鈺斺晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晽"
          echo "鈺? 馃搵 DDL Plan - 鍙樻洿褰卞搷鍒嗘瀽                     鈺?
          echo "鈺氣晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨暆"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED="$(git diff --name-only "$BASE" "$HEAD" \
              | grep -E '^feature/.*/create-table\.sql|^features/.*/ddl/.*\.sql' || true)"
            if [ -z "$CHANGED" ]; then
              echo "  鈩癸笍  鏈 PR 鏈秹鍙?DDL 鍙樻洿銆?
            else
              echo "  鍙樻洿鐨?DDL 鏂囦欢濡備笅锛堣纭繚宸查€氳繃 Dev 楠岃瘉鍚庡啀鍚堝苟锛夛細"
              echo "$CHANGED" | while read -r f; do echo "    馃梻锔? $f"; done
            fi
          else
            echo "  Plan mode锛堟墜鍔ㄨЕ鍙戯級: project=${{ github.event.inputs.project_name }}, env=${{ github.event.inputs.env_name }}"
          fi

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  # Job: apply-single  路  鍗曠幆澧冩墜鍔?DDL 鎵ц锛坢ode=apply锛?
  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  apply-single:
    name: "馃敡 Apply DDL (Single Env)"
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: "📋 Load env config from JSON files"
        shell: bash
        run: |
          MC_PROJECT=$(jq -r '.project' configuration/maxcompute-datasource.json)
          MC_ENDPOINT=$(jq -r '.endpoint' configuration/maxcompute-datasource.json)
          echo "MAXCOMPUTE_PROJECT=${MC_PROJECT}"   >> $GITHUB_ENV
          echo "MAXCOMPUTE_ENDPOINT=${MC_ENDPOINT}" >> $GITHUB_ENV


      - name: "馃梻锔? Normalize DDL directory"
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_NAME="${{ github.event.inputs.project_name }}"
          ENV_NAME="${{ github.event.inputs.env_name }}"
          RUNTIME_DIR=".ci_runtime/feature/${FEATURE_NAME}/${ENV_NAME}"
          mkdir -p "$RUNTIME_DIR"

          if [ -d "feature/${FEATURE_NAME}/${ENV_NAME}" ]; then
            cp "feature/${FEATURE_NAME}/${ENV_NAME}/setting.json" "${RUNTIME_DIR}/setting.json"
            cp "feature/${FEATURE_NAME}/${ENV_NAME}/create-table.sql" "${RUNTIME_DIR}/create-table.sql"
          elif [ -d "features/${FEATURE_NAME}" ]; then
            SRC_DIR="features/${FEATURE_NAME}"
            ENV_FILE_CANDIDATE_1="${SRC_DIR}/setting-${ENV_NAME}.json"
            ENV_FILE_CANDIDATE_2="${SRC_DIR}/setting-$(echo "$ENV_NAME" | sed 's/pre-prod/preprod/g').json"
            if   [ -f "$ENV_FILE_CANDIDATE_1" ]; then cp "$ENV_FILE_CANDIDATE_1" "${RUNTIME_DIR}/setting.json"
            elif [ -f "$ENV_FILE_CANDIDATE_2" ]; then cp "$ENV_FILE_CANDIDATE_2" "${RUNTIME_DIR}/setting.json"
            else echo "Missing setting file for env=${ENV_NAME}"; exit 1; fi
            DDL_FILE="$(ls -1 "${SRC_DIR}/ddl/"*.sql 2>/dev/null | sort | tail -n 1 || true)"
            [ -z "$DDL_FILE" ] && { echo "No DDL SQL found under ${SRC_DIR}/ddl"; exit 1; }
            cp "$DDL_FILE" "${RUNTIME_DIR}/create-table.sql"
          else
            echo "Project not found: feature/${FEATURE_NAME} or features/${FEATURE_NAME}"; exit 1
          fi
          echo "project_dir=${RUNTIME_DIR}" >> "$GITHUB_OUTPUT"

      - name: "馃搫 Execute DDL"
        run: |
          python scripts/create_table.py \
            --project-dir "${{ steps.normalize.outputs.project_dir }}" \
            --env "${{ github.event.inputs.env_name }}"

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  # Jobs: apply_all 涓茶妯″紡 鈥?Dev 鈫?QA 鈫?Pre-prod 鈫?Prod
  # 璁捐鍥炬爣鍑嗘祦绋嬶細涓€閿Е鍙戯紝鍚勭幆澧冮『搴忔墽琛岋紝prod 闇€浜哄伐瀹℃壒
  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  apply-dev:
    name: "馃煝 Apply DDL 鈫?DEV"
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'apply_all'
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      project_dir: ${{ steps.normalize.outputs.project_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: "📋 Load env config from JSON files"
        shell: bash
        run: |
          MC_PROJECT=$(jq -r '.project' configuration/maxcompute-datasource.json)
          MC_ENDPOINT=$(jq -r '.endpoint' configuration/maxcompute-datasource.json)
          echo "MAXCOMPUTE_PROJECT=${MC_PROJECT}"   >> $GITHUB_ENV
          echo "MAXCOMPUTE_ENDPOINT=${MC_ENDPOINT}" >> $GITHUB_ENV

      - name: "馃梻锔? Normalize DDL directory"
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_NAME="${{ github.event.inputs.project_name }}"
          ENV_NAME="dev"
          RUNTIME_DIR=".ci_runtime/feature/${FEATURE_NAME}/${ENV_NAME}"
          mkdir -p "$RUNTIME_DIR"
          if [ -d "features/${FEATURE_NAME}" ]; then
            SRC_DIR="features/${FEATURE_NAME}"
            ENV_FILE="${SRC_DIR}/setting-${ENV_NAME}.json"
            [ ! -f "$ENV_FILE" ] && { echo "Missing: $ENV_FILE"; exit 1; }
            cp "$ENV_FILE" "${RUNTIME_DIR}/setting.json"
            DDL_FILE="$(ls -1 "${SRC_DIR}/ddl/"*.sql 2>/dev/null | sort | tail -n 1 || true)"
            [ -z "$DDL_FILE" ] && { echo "No DDL SQL found"; exit 1; }
            cp "$DDL_FILE" "${RUNTIME_DIR}/create-table.sql"
          else
            echo "Project not found: features/${FEATURE_NAME}"; exit 1
          fi
          echo "project_dir=${RUNTIME_DIR}" >> "$GITHUB_OUTPUT"
      - name: "馃搫 Execute DDL on DEV"
        run: python scripts/create_table.py --project-dir "${{ steps.normalize.outputs.project_dir }}" --env "dev"

  apply-qa:
    name: "馃煛 Apply DDL 鈫?QA"
    needs: apply-dev
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'apply_all'
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: "📋 Load env config from JSON files"
        shell: bash
        run: |
          MC_PROJECT=$(jq -r '.project' configuration/maxcompute-datasource.json)
          MC_ENDPOINT=$(jq -r '.endpoint' configuration/maxcompute-datasource.json)
          echo "MAXCOMPUTE_PROJECT=${MC_PROJECT}"   >> $GITHUB_ENV
          echo "MAXCOMPUTE_ENDPOINT=${MC_ENDPOINT}" >> $GITHUB_ENV

      - name: "馃梻锔? Normalize DDL directory"
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_NAME="${{ github.event.inputs.project_name }}"
          ENV_NAME="qa"
          RUNTIME_DIR=".ci_runtime/feature/${FEATURE_NAME}/${ENV_NAME}"
          mkdir -p "$RUNTIME_DIR"
          SRC_DIR="features/${FEATURE_NAME}"
          ENV_FILE="${SRC_DIR}/setting-${ENV_NAME}.json"
          [ ! -f "$ENV_FILE" ] && { echo "Missing: $ENV_FILE"; exit 1; }
          cp "$ENV_FILE" "${RUNTIME_DIR}/setting.json"
          DDL_FILE="$(ls -1 "${SRC_DIR}/ddl/"*.sql 2>/dev/null | sort | tail -n 1 || true)"
          [ -z "$DDL_FILE" ] && { echo "No DDL SQL found"; exit 1; }
          cp "$DDL_FILE" "${RUNTIME_DIR}/create-table.sql"
          echo "project_dir=${RUNTIME_DIR}" >> "$GITHUB_OUTPUT"
      - name: "馃搫 Execute DDL on QA"
        run: python scripts/create_table.py --project-dir "${{ steps.normalize.outputs.project_dir }}" --env "qa"

  apply-preprod:
    name: "馃煚 Apply DDL 鈫?PRE-PROD"
    needs: apply-qa
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'apply_all'
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: "📋 Load env config from JSON files"
        shell: bash
        run: |
          MC_PROJECT=$(jq -r '.project' configuration/maxcompute-datasource.json)
          MC_ENDPOINT=$(jq -r '.endpoint' configuration/maxcompute-datasource.json)
          echo "MAXCOMPUTE_PROJECT=${MC_PROJECT}"   >> $GITHUB_ENV
          echo "MAXCOMPUTE_ENDPOINT=${MC_ENDPOINT}" >> $GITHUB_ENV

      - name: "馃梻锔? Normalize DDL directory"
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_NAME="${{ github.event.inputs.project_name }}"
          ENV_NAME="preprod"
          RUNTIME_DIR=".ci_runtime/feature/${FEATURE_NAME}/${ENV_NAME}"
          mkdir -p "$RUNTIME_DIR"
          SRC_DIR="features/${FEATURE_NAME}"
          ENV_FILE="${SRC_DIR}/setting-${ENV_NAME}.json"
          [ ! -f "$ENV_FILE" ] && { echo "Missing: $ENV_FILE"; exit 1; }
          cp "$ENV_FILE" "${RUNTIME_DIR}/setting.json"
          DDL_FILE="$(ls -1 "${SRC_DIR}/ddl/"*.sql 2>/dev/null | sort | tail -n 1 || true)"
          [ -z "$DDL_FILE" ] && { echo "No DDL SQL found"; exit 1; }
          cp "$DDL_FILE" "${RUNTIME_DIR}/create-table.sql"
          echo "project_dir=${RUNTIME_DIR}" >> "$GITHUB_OUTPUT"
      - name: "馃搫 Execute DDL on PRE-PROD"
        run: python scripts/create_table.py --project-dir "${{ steps.normalize.outputs.project_dir }}" --env "preprod"

  apply-prod:
    name: "馃敶 Apply DDL 鈫?PROD  馃敀 (Requires Approval)"
    needs: apply-preprod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'apply_all'
    runs-on: ubuntu-latest
    environment: prod    # 闇€瑕?GitHub Environment 鈫?prod 閰嶇疆瀹℃壒浜?
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: "📋 Load env config from JSON files"
        shell: bash
        run: |
          MC_PROJECT=$(jq -r '.project' configuration/maxcompute-datasource.json)
          MC_ENDPOINT=$(jq -r '.endpoint' configuration/maxcompute-datasource.json)
          echo "MAXCOMPUTE_PROJECT=${MC_PROJECT}"   >> $GITHUB_ENV
          echo "MAXCOMPUTE_ENDPOINT=${MC_ENDPOINT}" >> $GITHUB_ENV

      - name: "馃梻锔? Normalize DDL directory"
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_NAME="${{ github.event.inputs.project_name }}"
          ENV_NAME="prod"
          RUNTIME_DIR=".ci_runtime/feature/${FEATURE_NAME}/${ENV_NAME}"
          mkdir -p "$RUNTIME_DIR"
          SRC_DIR="features/${FEATURE_NAME}"
          ENV_FILE="${SRC_DIR}/setting-${ENV_NAME}.json"
          [ ! -f "$ENV_FILE" ] && { echo "Missing: $ENV_FILE"; exit 1; }
          cp "$ENV_FILE" "${RUNTIME_DIR}/setting.json"
          DDL_FILE="$(ls -1 "${SRC_DIR}/ddl/"*.sql 2>/dev/null | sort | tail -n 1 || true)"
          [ -z "$DDL_FILE" ] && { echo "No DDL SQL found"; exit 1; }
          cp "$DDL_FILE" "${RUNTIME_DIR}/create-table.sql"
          echo "project_dir=${RUNTIME_DIR}" >> "$GITHUB_OUTPUT"
      - name: "馃搫 Execute DDL on PROD"
        run: python scripts/create_table.py --project-dir "${{ steps.normalize.outputs.project_dir }}" --env "prod"

