# ─────────────────────────────────────────────────────────────────────────────
# datawork_node_create_update.yml  ·  DataWorks Node 创建/更新 主流水线
#
# 触发条件：main 分支有 features/** 目录下的文件变动时自动触发
#
# 执行流程：
#   1. detect    — 扫描 git diff，识别本次推送涉及哪些 feature 文件夹发生了变化
#   2. deploy-dev     — 部署到 DEV 环境
#   3. deploy-qa      — 部署到 QA 环境（needs: deploy-dev）
#   4. deploy-preprod — 部署到 PRE-PROD 环境（needs: deploy-qa）
#   5. deploy-prod    — 部署到 PROD 环境（needs: deploy-preprod，需要人工审批）
#
# 每个 deploy-* 阶段的具体执行逻辑均委托给可复用工作流：
#   .github/workflows/_deploy_env.yml
# ─────────────────────────────────────────────────────────────────────────────
name: datawork_node_create_update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── 触发条件 ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - "features/**"   # 仅当 features/ 目录内容发生变化时才触发
  workflow_dispatch:
    inputs:
      features:
        description: '逗号分隔的 feature 列表，或者输入 "all" 来部署全部 features'
        required: true
        default: 'all'

# ── 全局 secrets（由各 deploy Job 通过 secrets: inherit 向下传递）──────────────
# secrets 由 GitHub Repository → Settings → Secrets and variables 配置
# 实际注入在 _deploy_env.yml 中通过 secrets: 字段完成
# 此处无需声明全局 env，避免在 detect Job 中暴露敏感信息

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 0 · 检测变更 feature 列表
  # 通过 git diff 扫描本次 push 涉及的 features/<name>/ 子目录
  # ─────────────────────────────────────────────────────────────────────────
  detect:
    name: "🔍 Detect Changed Features"
    runs-on: ubuntu-latest
    outputs:
      feature_list: ${{ steps.resolve.outputs.feature_list }}
    steps:
      - name: "⬇️  Checkout (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 拉取完整历史，保证 git diff 能正确比对 BEFORE..AFTER

      - name: "📋 Resolve changed features"
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.features }}" = "all" ]; then
              CHANGED_FEATURES="$(ls -1 features/ 2>/dev/null || echo "")"
            else
              CHANGED_FEATURES=$(echo "${{ github.event.inputs.features }}" | tr ',' '\n' | sed 's/^[ \t]*//;s/[ \t]*$//' | grep -v '^$')
            fi
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            # 处理首次推送（BEFORE 为全零 SHA）的边界情况
            if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            fi

            # 2. 获取发生变更的集成节点名称
            # 提取 features/<name>/... 中的 <name> 层作为 feature 标识
            CHANGED_FEATURES="$(
              git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null \
                | sed -n 's#^features/\([^/]*\)/.*#\1#p' \
                | sort -u
            )"
          fi

          if [ -z "$CHANGED_FEATURES" ]; then
            echo "⚠️  未检测到任何待部署的 feature，跳过后续所有 deploy Job。"
            echo "feature_list=" >> "$GITHUB_OUTPUT"
          else
            echo "📋 待部署的 feature(s):"
            echo "$CHANGED_FEATURES"
            FEATURE_LIST="$(echo "$CHANGED_FEATURES" | tr '\n' ',' | sed 's/,$//')"
            echo "feature_list=${FEATURE_LIST}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 · 部署到 DEV 环境
  # ─────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: "🟢 Deploy → DEV"
    needs: detect
    if: needs.detect.outputs.feature_list != ''
    uses: ./.github/workflows/_deploy_env.yml
    with:
      env_name: "dev"
      feature_list: ${{ needs.detect.outputs.feature_list }}
    secrets:
      ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 · 部署到 QA 环境（DEV 成功后自动触发）
  # ─────────────────────────────────────────────────────────────────────────
  deploy-qa:
    name: "🟡 Deploy → QA"
    needs: [detect, deploy-dev]
    if: false # needs.detect.outputs.feature_list != ''
    uses: ./.github/workflows/_deploy_env.yml
    with:
      env_name: "qa"
      feature_list: ${{ needs.detect.outputs.feature_list }}
    secrets:
      ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3 · 部署到 PRE-PROD 环境（QA 成功后自动触发）
  # ─────────────────────────────────────────────────────────────────────────
  deploy-preprod:
    name: "🟠 Deploy → PRE-PROD"
    needs: [detect, deploy-qa]
    if: false # needs.detect.outputs.feature_list != ''
    uses: ./.github/workflows/_deploy_env.yml
    with:
      env_name: "preprod"
      feature_list: ${{ needs.detect.outputs.feature_list }}
    secrets:
      ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4 · 部署到 PROD 环境（需要 GitHub Environment 人工审批）
  # 在 Settings → Environments → prod 中配置 Required Reviewers
  # ─────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: "🔴 Deploy → PROD  🔒 (Requires Approval)"
    needs: [detect, deploy-preprod]
    if: false # needs.detect.outputs.feature_list != ''
    uses: ./.github/workflows/_deploy_env.yml
    with:
      env_name: "prod"
      feature_list: ${{ needs.detect.outputs.feature_list }}
    secrets:
      ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
