name: datawork_node_create_update

on:
  push:
    branches:
      - main
    paths:
      - "features/**"

env:
  DATAWORKS_PROJECT_ID: ${{ secrets.DATAWORKS_PROJECT_ID }}
  ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
  ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
  ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
  MAXCOMPUTE_PROJECT: ${{ secrets.MAXCOMPUTE_PROJECT }}
  MAXCOMPUTE_ENDPOINT: ${{ secrets.MAXCOMPUTE_ENDPOINT }}

jobs:
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 0: Detect Check
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  detect:
    name: Detect Changed Features
    runs-on: ubuntu-latest
    outputs:
      feature_list: ${{ steps.resolve.outputs.feature_list }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Resolve changed features
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          # жҸҗеҸ– features/<name>/... дёӯзҡ„ <name> еұӮ
          CHANGED_FEATURES="$(
            git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null \
              | sed -n 's#^features/\([^/]*\)/.*#\1#p' \
              | sort -u
          )"

          if [ -z "$CHANGED_FEATURES" ]; then
            echo "вҡ пёҸ  No changed features detected under features/. Skipping."
            echo "feature_list=" >> "$GITHUB_OUTPUT"
          else
            # 2. иҺ·еҸ–еҸ‘з”ҹеҸҳжӣҙзҡ„йӣҶжҲҗиҠӮзӮ№еҗҚз§°
            echo "рҹ“Ӣ Changed features detected:"
            echo "$CHANGED_FEATURES"
            FEATURE_LIST="$(echo "$CHANGED_FEATURES" | tr '\n' ',' | sed 's/,$//')"
            echo "feature_list=${FEATURE_LIST}" >> "$GITHUB_OUTPUT"
          fi

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 1: Deploy to DEV
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy-dev:
    name: Deploy DEV
    needs: detect
    if: needs.detect.outputs.feature_list != ''
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Execute DevOps workflow
        env:
          ENV_NAME: dev
          FEATURE_LIST: ${{ needs.detect.outputs.feature_list }}
        run: ./scripts/ci_deploy_loop.sh || bash -c 'echo "$FEATURE_LIST" | tr "," "\n" | while read F; do [ -z "$F" ] && continue; echo "Deploying $F"; bash -c "export FEATURE_NAME=$F; export ENV_NAME=$ENV_NAME; curl -s -o deploy.sh https://gist.githubusercontent.com/... && source deploy.sh"; done'

      # дёәдәҶи®©д»Јз Ғж•ҙжҙҒе№¶еӨҚз”Ё Bash йҖ»иҫ‘пјҢжҲ‘д»¬еңЁжӯҘйӘӨйҮҢзӣҙжҺҘеҶҷи„ҡжң¬еҫӘзҺҜ
      - name: Run Deploy Script for DEV
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_LIST="${{ needs.detect.outputs.feature_list }}"
          ENV_NAME="dev"

          echo "$FEATURE_LIST" | tr ',' '\n' | while read -r FEATURE_NAME; do
            [ -z "$FEATURE_NAME" ] && continue
            echo -e "\nв•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
            echo "в•‘  Deploying Feature: ${FEATURE_NAME} | Env: ${ENV_NAME}"
            echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"

            PROJECT_DIR="features/${FEATURE_NAME}"
            SETTING_FILE="${PROJECT_DIR}/setting-${ENV_NAME}.json"

            if [ ! -d "$PROJECT_DIR" ] || [ ! -f "$SETTING_FILE" ]; then
              echo "вҡ пёҸ  Missing directory or $SETTING_FILE for feature '${FEATURE_NAME}'. Skipping..."
              continue
            fi

            if python scripts/check_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
              echo -e "\nв”Җв”Җ [UPDATE WORKFLOW] иҠӮзӮ№е·ІеӯҳеңЁпјҢжү§иЎҢжӣҙж–°жөҒзЁӢ в”Җв”Җ"
              # 3.2.1 иҺ·еҸ–е·ІеҲӣе»әзҡ„ж•°жҚ®йӣҶжҲҗиҠӮзӮ№зҡ„й…ҚзҪ®пјҲе·ІеҢ…еҗ«еңЁ update и„ҡжң¬еҶ…пјү
              # 3.2.2 жӣҙж–°ж•°жҚ®йӣҶжҲҗиҠӮзӮ№
              python scripts/update_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            else
              echo -e "\nв”Җв”Җ [CREATION WORKFLOW] иҠӮзӮ№дёҚеӯҳеңЁпјҢжү§иЎҢе®Ңж•ҙеҲӣе»әжөҒзЁӢ в”Җв”Җ"
              # 3.1.1 жЈҖжҹҘ OSS жҳҜеҗҰиў«еҲӣе»әпјҢжңӘеҲӣе»әеҲҷеҲӣе»ә
              if ! python scripts/check_oss_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_oss_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              # 3.1.2 жЈҖжҹҘ Maxcompute ж•°жҚ®жәҗжҳҜеҗҰиў«еҲӣе»әпјҢжңӘеҲӣе»әеҲҷеҲӣе»ә
              if ! python scripts/check_mc_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_mc_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              # 3.1.3 еҲӣе»ә Maxcompute SQLиЎЁ
              python scripts/create_table.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.6.a (еүҚзҪ®) еҲӣе»ә Python иҠӮзӮ№ (Copy Parquet File)
              python scripts/create_python_cp_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME" --node-type cp
              # 3.1.4 еҲӣе»әж•°жҚ®йӣҶжҲҗиҠӮзӮ№
              python scripts/create_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.5 еҲӣе»әдёӢжёёиҠӮзӮ№
              python scripts/create_downstream_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.6.b (еҗҺзҪ®) еҲӣе»ә Python иҠӮзӮ№ (MaxCompute Data Delete)
              python scripts/create_python_cp_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME" --node-type delete
              # 3.1.7 еҸ‘еёғиҠӮзӮ№
              python scripts/publish_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            fi
            echo "вң… Env: ${ENV_NAME} Feature: ${FEATURE_NAME} еӨ„зҗҶе®ҢжҲҗгҖӮ"
          done

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 2: Deploy to QA
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy-qa:
    name: Deploy QA
    needs: [detect, deploy-dev]
    if: needs.detect.outputs.feature_list != ''
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Run Deploy Script for QA
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_LIST="${{ needs.detect.outputs.feature_list }}"
          ENV_NAME="qa"

          echo "$FEATURE_LIST" | tr ',' '\n' | while read -r FEATURE_NAME; do
            [ -z "$FEATURE_NAME" ] && continue
            echo -e "\nв•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
            echo "в•‘  Deploying Feature: ${FEATURE_NAME} | Env: ${ENV_NAME}"
            echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"

            PROJECT_DIR="features/${FEATURE_NAME}"
            SETTING_FILE="${PROJECT_DIR}/setting-${ENV_NAME}.json"

            if [ ! -d "$PROJECT_DIR" ] || [ ! -f "$SETTING_FILE" ]; then
              echo "вҡ пёҸ  Missing directory or $SETTING_FILE for feature '${FEATURE_NAME}'. Skipping..."
              continue
            fi

            if python scripts/check_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
              echo -e "\nв”Җв”Җ [UPDATE WORKFLOW] иҠӮзӮ№е·ІеӯҳеңЁпјҢжү§иЎҢжӣҙж–°жөҒзЁӢ в”Җв”Җ"
              # 3.2.1 иҺ·еҸ–е·ІеҲӣе»әзҡ„ж•°жҚ®йӣҶжҲҗиҠӮзӮ№зҡ„й…ҚзҪ®пјҲе·ІеҢ…еҗ«еңЁ update и„ҡжң¬еҶ…пјү
              # 3.2.2 жӣҙж–°ж•°жҚ®йӣҶжҲҗиҠӮзӮ№
              python scripts/update_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            else
              echo -e "\nв”Җв”Җ [CREATION WORKFLOW] иҠӮзӮ№дёҚеӯҳеңЁпјҢжү§иЎҢе®Ңж•ҙеҲӣе»әжөҒзЁӢ в”Җв”Җ"
              # 3.1.1 жЈҖжҹҘ OSS жҳҜеҗҰиў«еҲӣе»әпјҢжңӘеҲӣе»әеҲҷеҲӣе»ә
              if ! python scripts/check_oss_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_oss_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              # 3.1.2 жЈҖжҹҘ Maxcompute ж•°жҚ®жәҗжҳҜеҗҰиў«еҲӣе»әпјҢжңӘеҲӣе»әеҲҷеҲӣе»ә
              if ! python scripts/check_mc_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_mc_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              # 3.1.3 еҲӣе»ә Maxcompute SQLиЎЁ
              python scripts/create_table.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.6.a (еүҚзҪ®) еҲӣе»ә Python иҠӮзӮ№ (Copy Parquet File)
              python scripts/create_python_cp_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME" --node-type cp
              # 3.1.4 еҲӣе»әж•°жҚ®йӣҶжҲҗиҠӮзӮ№
              python scripts/create_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.5 еҲӣе»әдёӢжёёиҠӮзӮ№
              python scripts/create_downstream_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.6.b (еҗҺзҪ®) еҲӣе»ә Python иҠӮзӮ№ (MaxCompute Data Delete)
              python scripts/create_python_cp_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME" --node-type delete
              # 3.1.7 еҸ‘еёғиҠӮзӮ№
              python scripts/publish_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            fi
            echo "вң… Env: ${ENV_NAME} Feature: ${FEATURE_NAME} еӨ„зҗҶе®ҢжҲҗгҖӮ"
          done

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 3: Deploy to PRE-PROD
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy-preprod:
    name: Deploy PRE-PROD
    needs: [detect, deploy-qa]
    if: needs.detect.outputs.feature_list != ''
    runs-on: ubuntu-latest
    environment: pre-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Run Deploy Script for PRE-PROD
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_LIST="${{ needs.detect.outputs.feature_list }}"
          ENV_NAME="preprod"

          echo "$FEATURE_LIST" | tr ',' '\n' | while read -r FEATURE_NAME; do
            [ -z "$FEATURE_NAME" ] && continue
            echo -e "\nв•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
            echo "в•‘  Deploying Feature: ${FEATURE_NAME} | Env: ${ENV_NAME}"
            echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"

            PROJECT_DIR="features/${FEATURE_NAME}"
            SETTING_FILE="${PROJECT_DIR}/setting-${ENV_NAME}.json"

            if [ ! -d "$PROJECT_DIR" ] || [ ! -f "$SETTING_FILE" ]; then
              echo "вҡ пёҸ  Missing directory or $SETTING_FILE for feature '${FEATURE_NAME}'. Skipping..."
              continue
            fi

            if python scripts/check_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
              echo -e "\nв”Җв”Җ [UPDATE WORKFLOW] иҠӮзӮ№е·ІеӯҳеңЁпјҢжү§иЎҢжӣҙж–°жөҒзЁӢ в”Җв”Җ"
              # 3.2.1 иҺ·еҸ–е·ІеҲӣе»әзҡ„ж•°жҚ®йӣҶжҲҗиҠӮзӮ№зҡ„й…ҚзҪ®пјҲе·ІеҢ…еҗ«еңЁ update и„ҡжң¬еҶ…пјү
              # 3.2.2 жӣҙж–°ж•°жҚ®йӣҶжҲҗиҠӮзӮ№
              python scripts/update_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            else
              echo -e "\nв”Җв”Җ [CREATION WORKFLOW] иҠӮзӮ№дёҚеӯҳеңЁпјҢжү§иЎҢе®Ңж•ҙеҲӣе»әжөҒзЁӢ в”Җв”Җ"
              # 3.1.1 жЈҖжҹҘ OSS жҳҜеҗҰиў«еҲӣе»әпјҢжңӘеҲӣе»әеҲҷеҲӣе»ә
              if ! python scripts/check_oss_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_oss_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              # 3.1.2 жЈҖжҹҘ Maxcompute ж•°жҚ®жәҗжҳҜеҗҰиў«еҲӣе»әпјҢжңӘеҲӣе»әеҲҷеҲӣе»ә
              if ! python scripts/check_mc_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_mc_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              # 3.1.3 еҲӣе»ә Maxcompute SQLиЎЁ
              python scripts/create_table.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.6.a (еүҚзҪ®) еҲӣе»ә Python иҠӮзӮ№ (Copy Parquet File)
              python scripts/create_python_cp_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME" --node-type cp
              # 3.1.4 еҲӣе»әж•°жҚ®йӣҶжҲҗиҠӮзӮ№
              python scripts/create_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.5 еҲӣе»әдёӢжёёиҠӮзӮ№
              python scripts/create_downstream_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.6.b (еҗҺзҪ®) еҲӣе»ә Python иҠӮзӮ№ (MaxCompute Data Delete)
              python scripts/create_python_cp_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME" --node-type delete
              # 3.1.7 еҸ‘еёғиҠӮзӮ№
              python scripts/publish_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            fi
            echo "вң… Env: ${ENV_NAME} Feature: ${FEATURE_NAME} еӨ„зҗҶе®ҢжҲҗгҖӮ"
          done

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 4: Deploy to PROD (Requires Approval)
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy-prod:
    name: Deploy PROD
    needs: [detect, deploy-preprod]
    if: needs.detect.outputs.feature_list != ''
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Run Deploy Script for PROD
        shell: bash
        run: |
          set -euo pipefail
          FEATURE_LIST="${{ needs.detect.outputs.feature_list }}"
          ENV_NAME="prod"

          echo "$FEATURE_LIST" | tr ',' '\n' | while read -r FEATURE_NAME; do
            [ -z "$FEATURE_NAME" ] && continue
            echo -e "\nв•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
            echo "в•‘  Deploying Feature: ${FEATURE_NAME} | Env: ${ENV_NAME}"
            echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"

            PROJECT_DIR="features/${FEATURE_NAME}"
            SETTING_FILE="${PROJECT_DIR}/setting-${ENV_NAME}.json"

            if [ ! -d "$PROJECT_DIR" ] || [ ! -f "$SETTING_FILE" ]; then
              echo "вҡ пёҸ  Missing directory or $SETTING_FILE for feature '${FEATURE_NAME}'. Skipping..."
              continue
            fi

            # 3. жЈҖжҹҘж•°жҚ®иҠӮзӮ№жҳҜеҗҰиў«еҲӣе»әпјҲйҖҖеҮәз Ғ 0 иЎЁзӨәе·ІеӯҳеңЁпјү
            if python scripts/check_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
              echo -e "\nв”Җв”Җ [UPDATE WORKFLOW] иҠӮзӮ№е·ІеӯҳеңЁпјҢжү§иЎҢжӣҙж–°жөҒзЁӢ в”Җв”Җ"
              # 3.2.1 иҺ·еҸ–е·ІеҲӣе»әзҡ„ж•°жҚ®йӣҶжҲҗиҠӮзӮ№зҡ„й…ҚзҪ®пјҲе·ІеҢ…еҗ«еңЁ update и„ҡжң¬еҶ…пјү
              # 3.2.2 жӣҙж–°ж•°жҚ®йӣҶжҲҗиҠӮзӮ№
              python scripts/update_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            else
              echo -e "\nв”Җв”Җ [CREATION WORKFLOW] иҠӮзӮ№дёҚеӯҳеңЁпјҢжү§иЎҢе®Ңж•ҙеҲӣе»әжөҒзЁӢ в”Җв”Җ"
              # 3.1.1 жЈҖжҹҘ OSS жҳҜеҗҰиў«еҲӣе»әпјҢжңӘеҲӣе»әеҲҷеҲӣе»ә
              if ! python scripts/check_oss_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_oss_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              # 3.1.2 жЈҖжҹҘ Maxcompute ж•°жҚ®жәҗжҳҜеҗҰиў«еҲӣе»әпјҢжңӘеҲӣе»әеҲҷеҲӣе»ә
              if ! python scripts/check_mc_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"; then
                python scripts/create_mc_ds.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              fi
              # 3.1.3 еҲӣе»ә Maxcompute SQLиЎЁ
              python scripts/create_table.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.6.a (еүҚзҪ®) еҲӣе»ә Python иҠӮзӮ№ (Copy Parquet File)
              python scripts/create_python_cp_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME" --node-type cp
              # 3.1.4 еҲӣе»әж•°жҚ®йӣҶжҲҗиҠӮзӮ№
              python scripts/create_integration_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.5 еҲӣе»әдёӢжёёиҠӮзӮ№
              python scripts/create_downstream_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
              # 3.1.6.b (еҗҺзҪ®) еҲӣе»ә Python иҠӮзӮ№ (MaxCompute Data Delete)
              python scripts/create_python_cp_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME" --node-type delete
              # 3.1.7 еҸ‘еёғиҠӮзӮ№
              python scripts/publish_node.py --project-dir "$PROJECT_DIR" --env "$ENV_NAME"
            fi
            echo "вң… Env: ${ENV_NAME} Feature: ${FEATURE_NAME} еӨ„зҗҶе®ҢжҲҗгҖӮ"
          done
