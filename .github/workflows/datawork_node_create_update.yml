# ─────────────────────────────────────────────────────────────────────────────
# datawork_node_create_update.yml  ·  DataWorks Node 创建/更新 主流水线
#
# 触发条件：main 分支有 features/** 目录下的文件变动时自动触发
#
# 执行流程：
#   1. detect    — 扫描 git diff，识别本次推送涉及哪些环境的配置发生变动
#   2. deploy-*  — 四个环境独立并行判断，只部署发生了配置变更的 feature 到对应环境
#
# 每个 deploy-* 阶段的具体执行逻辑均委托给可复用工作流：
#   .github/workflows/_deploy_env.yml
# ─────────────────────────────────────────────────────────────────────────────
name: datawork_node_create_update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── 触发条件 ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - "features/**"         # 仅当 features/ 目录内容发生变化时触发
      - "!features/shared/**" # 忽略 shared 共用目录的变动
  workflow_dispatch:
    inputs:
      features:
        description: '逗号分隔的 feature 列表，或者输入 "all" 来部署全部 features'
        required: true
        default: 'all'
      target_env:
        description: '目标环境 (all, dev, qa, preprod, prod)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - dev
          - qa
          - preprod
          - prod

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 0 · 检测变更 feature 列表
  # 通过 git diff 扫描本次 push 涉及的 features/<name>/ 子目录，并拆分到不同环境
  # ─────────────────────────────────────────────────────────────────────────
  detect:
    name: "🔍 Detect Changed Features Per Env"
    runs-on: ubuntu-latest
    outputs:
      feature_list_dev: ${{ steps.resolve.outputs.feature_list_dev }}
      feature_list_qa: ${{ steps.resolve.outputs.feature_list_qa }}
      feature_list_preprod: ${{ steps.resolve.outputs.feature_list_preprod }}
      feature_list_prod: ${{ steps.resolve.outputs.feature_list_prod }}
    steps:
      - name: "⬇️  Checkout (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 拉取完整历史，保证 git diff 能正确比对 BEFORE..AFTER

      - name: "📋 Resolve changed features per environment"
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.features }}" = "all" ]; then
              CHANGED_FEATURES="$(ls -1 features/ 2>/dev/null | grep -v '^shared$' || echo "")"
            else
              CHANGED_FEATURES=$(echo "${{ github.event.inputs.features }}" | tr ',' '\n' | sed 's/^[ \t]*//;s/[ \t]*$//' | grep -v '^$' | grep -v '^shared$')
            fi
            
            FEATURE_LIST="$(echo "$CHANGED_FEATURES" | tr '\n' ',' | sed 's/,$//')"
            TARGET_ENV="${{ github.event.inputs.target_env }}"
            
            if [ "$TARGET_ENV" = "all" ] || [ "$TARGET_ENV" = "dev" ]; then
              echo "feature_list_dev=${FEATURE_LIST}" >> "$GITHUB_OUTPUT"
            fi
            if [ "$TARGET_ENV" = "all" ] || [ "$TARGET_ENV" = "qa" ]; then
              echo "feature_list_qa=${FEATURE_LIST}" >> "$GITHUB_OUTPUT"
            fi
            if [ "$TARGET_ENV" = "all" ] || [ "$TARGET_ENV" = "preprod" ]; then
              echo "feature_list_preprod=${FEATURE_LIST}" >> "$GITHUB_OUTPUT"
            fi
            if [ "$TARGET_ENV" = "all" ] || [ "$TARGET_ENV" = "prod" ]; then
              echo "feature_list_prod=${FEATURE_LIST}" >> "$GITHUB_OUTPUT"
            fi
            
            echo "手动调度：目标环境 [$TARGET_ENV], 准备部署 features: ${FEATURE_LIST}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            # 处理首次推送（BEFORE 为全零 SHA）的边界情况
            if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            fi

            # 取出变更的 feature 目录，排除 shared
            CHANGED_FEATURES="$(
              git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null \
                | sed -n 's#^features/\([^/]*\)/.*#\1#p' \
                | grep -v '^shared$' \
                | sort -u || true
            )"

            DEV_FEATURES=""
            QA_FEATURES=""
            PREPROD_FEATURES=""
            PROD_FEATURES=""

            if [ -n "$CHANGED_FEATURES" ]; then
              for FEATURE in $CHANGED_FEATURES; do
                # 获取该 feature 下的具体变动文件
                CHANGES=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null | grep "^features/$FEATURE/" || true)
                
                # 如果是 DDL 等变动，往往需要全局同步；如果只改了特定环境的 setting JSON，则只发布特定环境
                if echo "$CHANGES" | grep -q -E "/ddl/|create-table"; then
                  DEV_FEATURES="$DEV_FEATURES,$FEATURE"
                  QA_FEATURES="$QA_FEATURES,$FEATURE"
                  PREPROD_FEATURES="$PREPROD_FEATURES,$FEATURE"
                  PROD_FEATURES="$PROD_FEATURES,$FEATURE"
                else
                  if echo "$CHANGES" | grep -q "setting-dev.json"; then DEV_FEATURES="$DEV_FEATURES,$FEATURE"; fi
                  if echo "$CHANGES" | grep -q "setting-qa.json"; then QA_FEATURES="$QA_FEATURES,$FEATURE"; fi
                  if echo "$CHANGES" | grep -q "setting-preprod.json"; then PREPROD_FEATURES="$PREPROD_FEATURES,$FEATURE"; fi
                  if echo "$CHANGES" | grep -q "setting-prod.json"; then PROD_FEATURES="$PROD_FEATURES,$FEATURE"; fi
                fi
              done
            fi

            # 整理去除开头的逗号并输出给下一步
            OUT_DEV=$(echo "$DEV_FEATURES" | sed 's/^,//')
            OUT_QA=$(echo "$QA_FEATURES" | sed 's/^,//')
            OUT_PREPROD=$(echo "$PREPROD_FEATURES" | sed 's/^,//')
            OUT_PROD=$(echo "$PROD_FEATURES" | sed 's/^,//')

            echo "feature_list_dev=$OUT_DEV" >> "$GITHUB_OUTPUT"
            echo "feature_list_qa=$OUT_QA" >> "$GITHUB_OUTPUT"
            echo "feature_list_preprod=$OUT_PREPROD" >> "$GITHUB_OUTPUT"
            echo "feature_list_prod=$OUT_PROD" >> "$GITHUB_OUTPUT"
            
            echo "📋 部署分析结果 (独立环境变更):"
            echo "DEV     : $OUT_DEV"
            echo "QA      : $OUT_QA"
            echo "PREPROD : $OUT_PREPROD"
            echo "PROD    : $OUT_PROD"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 · 部署到 DEV 环境
  # ─────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: "🟢 Deploy → DEV"
    needs: detect
    if: needs.detect.outputs.feature_list_dev != ''
    uses: ./.github/workflows/_deploy_env.yml
    with:
      env_name: "dev"
      feature_list: ${{ needs.detect.outputs.feature_list_dev }}
    secrets:
      ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 · 部署到 QA 环境（独立并行执行）
  # ─────────────────────────────────────────────────────────────────────────
  deploy-qa:
    name: "🟡 Deploy → QA"
    needs: detect
    if: needs.detect.outputs.feature_list_qa != ''
    uses: ./.github/workflows/_deploy_env.yml
    with:
      env_name: "qa"
      feature_list: ${{ needs.detect.outputs.feature_list_qa }}
    secrets:
      ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3 · 部署到 PRE-PROD 环境（独立并行执行）
  # ─────────────────────────────────────────────────────────────────────────
  deploy-preprod:
    name: "🟠 Deploy → PRE-PROD"
    needs: detect
    if: needs.detect.outputs.feature_list_preprod != ''
    uses: ./.github/workflows/_deploy_env.yml
    with:
      env_name: "preprod"
      feature_list: ${{ needs.detect.outputs.feature_list_preprod }}
    secrets:
      ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4 · 部署到 PROD 环境（独立触发）
  # 注意：虽与其它环境并行触发，但通过 GitHub Environments 配置依然会卡在人工审批。
  # ─────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: "🔴 Deploy → PROD  🔒 (Requires Approval)"
    needs: detect
    if: needs.detect.outputs.feature_list_prod != ''
    uses: ./.github/workflows/_deploy_env.yml
    with:
      env_name: "prod"
      feature_list: ${{ needs.detect.outputs.feature_list_prod }}
    secrets:
      ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
