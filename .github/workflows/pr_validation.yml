# ─────────────────────────────────────────────────────────────────────────────
# pr_validation.yml  ·  PR 安全扫描工作流
#
# 触发条件：向 main 分支发起 Pull Request 时自动执行
# 职责：
#   1. SonarCloud 代码质量扫描（代码异味、覆盖率、重复率等）
#   2. GitGuardian 密钥泄露检测（防止 AccessKey/密码被提交进代码）
#
# 配套 Secrets（在 GitHub → Settings → Secrets and variables → Actions 中配置）：
#   - SONAR_TOKEN        ：SonarCloud 令牌（https://sonarcloud.io）
#   - GITGUARDIAN_API_KEY：GitGuardian API Key（https://dashboard.gitguardian.com）
#
# ⚠️  当前两项扫描均配置为 continue-on-error: true（发现问题不阻断 PR 合并）
#     待账号配置完成后，可将 continue-on-error 去掉或改为 false，
#     届时扫描不通过将自动阻止 PR 被合并。
# ─────────────────────────────────────────────────────────────────────────────
name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1：SonarCloud 代码质量扫描
  # 检测代码异味、安全漏洞、测试覆盖率、重复率等
  # ─────────────────────────────────────────────────────────────────────────
  sonar-scan:
    name: "🔍 SonarCloud Code Quality Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "⬇️  Checkout with full history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # SonarCloud 需要完整 git 历史以进行 blame 分析

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: pip install -r scripts/requirements.txt

      # SonarCloud 扫描
      # 配置文件：项目根目录下的 sonar-project.properties（如存在）
      # 文档：https://github.com/SonarSource/sonarcloud-github-action
      - name: "📊 SonarCloud Scan"
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true   # ⚠️ 暂无账号，失败不阻断 PR，接入账号后去掉此行
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub 内置，无需配置
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # 需在 Secrets 中配置

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2：GitGuardian 密钥泄露检测
  # 扫描本次 PR 提交中是否包含 API Key、密码、证书等敏感信息
  # ─────────────────────────────────────────────────────────────────────────
  gitguardian-scan:
    name: "🔐 GitGuardian Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - name: "⬇️  Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 扫描全量提交历史

      # GitGuardian ggshield 扫描
      # 文档：https://github.com/GitGuardian/ggshield-action
      - name: "🔐 GitGuardian Scan"
        uses: GitGuardian/ggshield-action@v1
        continue-on-error: true   # ⚠️ 暂无账号，失败不阻断 PR，接入账号后去掉此行
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}   # 需在 Secrets 中配置

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3：打印本次 PR 涉及的 DDL 变更文件列表（辅助 Review）
  # ─────────────────────────────────────────────────────────────────────────
  ddl-change-report:
    name: "📋 DDL Change Report"
    runs-on: ubuntu-latest
    steps:
      - name: "⬇️  Checkout with full history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📋 Report changed DDL files"
        shell: bash
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  📋 DDL 变更报告 (for code review)              ║"
          echo "╚══════════════════════════════════════════════════╝"

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" \
            | grep -E '^features/.*/ddl/.*\.sql' || true)

          if [ -z "$CHANGED" ]; then
            echo "  ℹ️  本次 PR 未涉及 DDL 脚本变更。"
          else
            echo "  以下 DDL 文件发生了变更，请确保已通过 Dev 环境验证："
            echo "$CHANGED" | while read -r f; do
              echo "    🗂️  $f"
            done
          fi
