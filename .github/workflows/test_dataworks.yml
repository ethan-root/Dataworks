name: "[TEST] DataWorks Integration"

on:
  workflow_dispatch:
    inputs:
      action:
        description: '执行操作'
        required: true
        default: 'create_node'
        type: choice
        options:
          - create_table
          - check_integration_node
          - create_node
          - update_integration_node
          - publish_node
          - clean_mc_tables
          - create_oss_ds
          - create_mc_ds
          - validate_row_count
          - get_earliest_parquet
          - create_upstream_node
          - create_downstream_node
          - create_delete_mc_node
      ext_table:
        description: '外部表名（OSS Parquet 外表）'
        required: false
        default: 'val_feature_demo_ext'
      int_table:
        description: '内部表名（MaxCompute 内表）'
        required: false
        default: 'user'
      project_dir:
        description: '功能目录'
        required: false
        default: 'features/test-feature'
      env_name:
        description: '目标环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - pre-prod
          - prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATAWORKS_PROJECT_ID: ${{ secrets.DATAWORKS_PROJECT_ID }}
  ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
  ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
  ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
  MAXCOMPUTE_PROJECT: ${{ secrets.MAXCOMPUTE_PROJECT }}
  MAXCOMPUTE_ENDPOINT: ${{ secrets.MAXCOMPUTE_ENDPOINT }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Create MaxCompute Table
        if: ${{ github.event.inputs.action == 'create_table' }}
        run: python scripts/create_table.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Check DataWorks Integration Node
        if: ${{ github.event.inputs.action == 'check_integration_node' }}
        run: python scripts/check_integration_node.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Create DataWorks Integration Node
        if: ${{ github.event.inputs.action == 'create_node' }}
        run: python scripts/create_integration_node.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Update DataWorks Integration Node
        if: ${{ github.event.inputs.action == 'update_integration_node' }}
        run: python scripts/update_integration_node.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Publish DataWorks Node
        if: ${{ github.event.inputs.action == 'publish_node' }}
        run: python scripts/publish_node.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Clean MaxCompute Tables (Dry Run by default)
        if: ${{ github.event.inputs.action == 'clean_mc_tables' }}
        run: python scripts/clean_mc_tables.py

      - name: Create OSS DataSource
        if: ${{ github.event.inputs.action == 'create_oss_ds' }}
        run: python scripts/create_oss_ds.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Create MaxCompute DataSource
        if: ${{ github.event.inputs.action == 'create_mc_ds' }}
        run: python scripts/create_mc_ds.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Validate Row Count (External vs Internal Table)
        if: ${{ github.event.inputs.action == 'validate_row_count' }}
        run: |
          python scripts/validate_row_count.py \
            --ext-table ${{ github.event.inputs.ext_table }} \
            --int-table ${{ github.event.inputs.int_table }}

      - name: Get Earliest Parquet File (write state)
        if: ${{ github.event.inputs.action == 'get_earliest_parquet' }}
        run: python scripts/create_upstream_node.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Create Upstream Node
        if: ${{ github.event.inputs.action == 'create_upstream_node' }}
        run: python scripts/create_upstream_node.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Create Downstream Node
        if: ${{ github.event.inputs.action == 'create_downstream_node' }}
        run: python scripts/create_downstream_node.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }}

      - name: Create Delete MC Node
        if: ${{ github.event.inputs.action == 'create_delete_mc_node' }}
        run: python scripts/create_python_cp_node.py --project-dir ${{ github.event.inputs.project_dir }} --env ${{ github.event.inputs.env_name }} --node-type delete
